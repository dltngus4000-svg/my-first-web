          <script>
            function processorder() {

              let name = document.getElementById('useName').value;
               let phone = document.getElementById('userPone').value;

               let feeValue=document.getElementById("deliveryFee").value;
               let deliveryFee=Number(feeValue);

               let productprice = 15000;
               let totalprice = productprice + deliveryFee;

               if(name==="" || phone ===""){
                alert("성함과 연락처를 모두 입력해 주세요!");
                return;
               }
               let receipt = document.getElementById('receipt');

               receipt.innerHTML = `
               <h3> 주문 확인 영수증 </h3>
               <p><strong>주문자:</stong>${name}님</p>
               <P><stong>연락처:</stong>${phone}님</p>
               <P><stong>상품가격:</stong>${productprice.toLocaleString()}원</p>
               <P><stong>연락처:</stong>${deliveryFee.toLocaleString()}원</p>

               <hr>
               <p style="font-size: 1.2em;"><string> 총 결제 금액:
               <span style"color:red;">${totalprice.toLocaleString()}원</p>
               </strong></p>
