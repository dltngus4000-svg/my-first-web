<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 웹 페이지</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

  <style>
    /* 🔒 로그인 전체 덮는 화면 */
    #login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .login-box {
      text-align: center;
    }
  </style>
</head>

<body>

<!-- 🔒 로그인 화면 (추가된 부분) -->
<div id="login-overlay">
  <div class="login-box">
    <h2>시스템 인증이 필요합니다</h2>
    <input type="password" id="userPw" maxlength="4" placeholder="암호 4자리" />
    <br><br>
    <button onclick="checkLogin()">입장하기</button>
  </div>
</div>

<header>
  <h1>노력은 배신하지 않는다</h1>
</header>

<nav>
  <a href="index.html">홈으로</a>
  <a href="subject.html">진로 탐구</a>
  <a href="gallery.html">갤러리</a>
</nav>

<main>

  <!-- ⭐ 기존 내용 그대로 유지 -->
  <div style="text-align: center; margin:50px;"> 
    <article class="crop-item">
      
      <figure class="crop-image">
        <img src="./images/lettuce.png" alt="직접 재배한 농작물 사진">
        <figcaption>그림1. 본인이 직접 재배한 농작물 실물</figcaption> 
      </figure>

      <div class="crop-details">
        <h3>농작물 명칭: 상추</h3>

        <section class="info-block">
          <h4>재배 및 생산 특성</h4>
          <ul>
            <li><strong>품종:</strong> 상추</li>
            <li><strong>재배 환경:</strong> 시설재배 / 노지재배</li>
          </ul>
        </section>

        <section class="info-block">
          <h4>유통 구조</h4>
          <p>생산자 → 로컬푸드 직매장 → 소비자</p>
        </section>
      </div>

    </article>
  </div>

  <section id="order-area">
    <hr>
    <h2>📦 온라인 주문하기</h2>

    <input type="text" id="userName" placeholder="이름"><br><br>
    <input type="text" id="userPhone" placeholder="연락처"><br><br>

    <select id="unitWeight">
      <option value="15000">상추 1kg (15,000원)</option>
      <option value="40000">상추 1kg (40,000원)</option>
      <option value="60000">상추 1kg (60,000원)</option>
    </select><br><br>

    <input type="number" id="quantity" value="1" min="1" max="10"><br><br>

    <select id="deliveryFee">
      <option value="3000">일반 택배 (3,000원)</option>
      <option value="5000">새벽 배송 (5,000원)</option>
      <option value="0">매장 픽업 (무료)</option>
    </select><br><br>

    <textarea placeholder="요청사항"></textarea><br><br>

    <button onclick="processOrder()">주문하기</button>

    <div id="receipt" style="display:none; margin-top:20px;"></div>

  </section>

</main>

<footer style="text-align:center; margin-top:30px;">
  <p>&copy; 2026 이수현</p>
</footer>

<script>

function checkLogin() {
  let pw = document.getElementById("userPw").value;

  if (pw === "0815") {
    alert("인증 성공!");
    document.getElementById("login-overlay").style.display = "none";
  } else {
    alert("암호가 틀렸습니다.");
  }
}

function processOrder() {

  let name = document.getElementById('userName').value;
  let phone = document.getElementById('userPhone').value;

  if (name === "") {
    alert("이름 입력!");
    return;
  }
  if (phone === "") {
    alert("연락처 입력!");
    return;
  }

  let quantity = Number(document.getElementById("quantity").value);
  let deliveryFee = Number(document.getElementById("deliveryFee").value);

  let unitSelect = document.getElementById("unitWeight");
  let productName = unitSelect.options[unitSelect.selectedIndex].text;
  let productPrice = Number(unitSelect.value);

  let basePrice = productPrice * quantity;

  if (basePrice >= 30000) {
    deliveryFee = 0;
  }

  let total = basePrice + deliveryFee;

  let receipt = document.getElementById("receipt");

  receipt.innerHTML = `
    <h3>주문 완료</h3>
    <p>이름: ${name}</p>
    <p>상품: ${productName}</p>
    <p>수량: ${quantity}</p>
    <p>총 금액: ${total.toLocaleString()}원</p>
  `;

  receipt.style.display = "block";
}

</script>

</body>
</html>
