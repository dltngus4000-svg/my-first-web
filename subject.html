      <section id="order-area">
<hr>
<h2>📦온라인 주문하기</h2>
<form action="">
<div class="input-row">
<div class="input-group">
    <label>주문자 성함</label>
    <input type="text" id="userName" placeholder="실명을 입력하세요">
    </div>
    <div class="input-group">
        <label>연락처</label>
        <input type="text" id="userPhone"placeholder="010-0000-0000">
    </div>
</div>

<div class="input-row">
<div class="input-group">
<label for="unitWeight">구매 단위 선택</label>
<select id="unitWeight">
<option value="15000">유기농 방울토마토 1kg (15,000원)</option>
<option value="40000">유기농 방울토마토 1kg (40,000원)</option>
<option value="60000">유기농 방울토마토 1kg (60,000원)</option>
</select>
</div>

<div class="input-group">
<label for="quantity">주문 수량 (박스)</label>
<input type="number" id="quantity" value="1" min="1" max="10">
</div>
</div>

<div class="input-group">
    <label>배송 방식 선택</label>
    <select id="deliveryFee">
        <option value="3000">일반 택배 (3,000원)</option>
        <option value="5000">신선 새벽 배송 (5,000원)</option>
        <option value="0">광주 로컬푸드 매장 픽업 (무료)</option>
    </select>
</div>



<div class="input-group">
    <label>요청사항</label>
    <textarea placeholder="부재 시 문 앞에 놓아주세요(선택)"></textarea>
</div>
<button type="button" class="order-btn" onclick="processOrder()">지금 바로 주문 완료</button>
<div id="receipt" class="receipt-box">
</div>

</form>
 </section>

    <script>

        function processOrder() {
            let name =document.getElementById('userName').value;
            let phone = document.getElementById('userPhone').value;
  
            let message = document.querySelector("textarea").value;
            let deliverySelect = document.getElementById("deliveryFee");
            let delivery = deliverySelect.options[deliverySelect.selectedIndex].text;
            let quantity = Number(document.getElementById("quantity").value);
            let deliveryFee = Number(document.getElementById("deliveryFee").value);


            let unitSelect = document.getElementById("unitWeight");
     
           let productName = unitSelect.options[unitSelect.selectedIndex].text;


            let productPrise=Number(unitSelect.value);

         let basePrise=productPrise * quantity;

if(basePrise>=30000){
    deliveryFee = 0; //3만원 이상 구매시 배송비 무료
}

let totalPrice=basePrise + deliveryFee;
let dateString = new Date().toLocaleString();

             if (name=== ""){
                     alert("이름을 입력해주세요.")
                     return;
                    }
                else if(phone === ""){
                    alert("연락처를 입력해주세요.")
                    return;
                }
              

            let receipt=document.getElementById('receipt');

            receipt.innerHTML=`
            <h2> 주문 확인 영수증</h2>
            <p style="color: gray; font-size: 0.8em">주문 시각: ${dateString}</p>
        
            <p><strong>주문자:</strong> ${name}님</p>
              <p><strong>연락처:</strong> ${phone}</p>
           
            <p><strong>주문 상품:</strong> ${productName}</p>
            <p><strong>주문 수량:</strong> ${quantity} 박스</p>
      
                   <p><strong>배송방식:</strong> ${delivery}</p>
            <p><strong>배송비:</strong>
                ${deliveryFee=== 0 ? "무료배송": deliveryFee.toLocaleString()+"원"}
                </p>
          
            <p><strong>요청사항:</strong> ${message || "없음"}</p>
    
            <p style="font-size: 1.2em"><strong>총 결제 금액:
                <span style="color:black;"> ${totalPrice.toLocaleString()}원</span>
                </strong><p>
            <hr>
            <p style="text-align:center;">주문해주셔서 감사합니다!</p>
        `;

        receipt.style.display="block";
        }

    
    </script>
